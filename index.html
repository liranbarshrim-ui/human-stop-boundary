<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Architecture of Accountability</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#090909;
  --surface:#111;
  --gold:#c8a96e;
  --text:#e6e0d4;
  --muted:#7a7570;
  --border:#2a2a2a;
}

* {margin:0;padding:0;box-sizing:border-box;}

body {
  background:var(--bg);
  color:var(--text);
  font-family:'IBM Plex Mono', monospace;
}

.container {
  max-width:760px;
  margin:auto;
  padding:60px 24px;
}

/* ===== TITLE ===== */
h1 {
  font-family:'Playfair Display', serif;
  border-left:3px solid var(--gold);
  padding-left:20px;
  margin-bottom:30px;
  font-size:32px;
  line-height:1.2;
}

/* ===== HIGHLIGHT ===== */
.highlight {
  border-left:3px solid var(--gold);
  padding:16px;
  background:var(--surface);
  margin-bottom:50px;
  font-style:italic;
  color:var(--text);
}

/* ===== FOOTER LINKS ===== */
.footer {
  display:flex;
  flex-direction:column;
  gap:16px;
}

.footer a {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 22px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.02);
  text-decoration:none;
  transition:all 0.25s ease;
  position:relative;
}

/* gold side line */
.footer a::before {
  content:"";
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:2px;
  background:var(--gold);
  opacity:0;
  transition:opacity 0.25s;
}

.footer a:hover {
  border-color:var(--gold);
  background:rgba(200,169,110,0.05);
}

.footer a:hover::before {
  opacity:1;
}

/* text structure */
.label {
  font-size:10px;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--gold);
}

.title {
  font-family:'Playfair Display', serif;
  font-size:15px;
  color:var(--text);
}

.arrow {
  color:var(--muted);
  transition:0.2s;
}

.footer a:hover .arrow {
  color:var(--gold);
}

/* ===== COPYRIGHT ===== */
.copyright {
  margin-top:50px;
  font-size:11px;
  color:#52504c;
}
</style>
</head>

<body>
<div class="container">

<h1>The Architecture of Accountability</h1>

<div class="highlight">
"We" is not a mistake. It is a structure.
</div>

<div class="footer">

<a href="/we.html">
  <div>
    <div class="label">Essay</div>
    <div class="title">Read the full argument</div>
  </div>
  <div class="arrow">→</div>
</a>

<!-- CONTACT -->
<a href="mailto:Liran@liranbarshrim.com">
  <div>
    <div class="label">Contact</div>
    <div class="title">Liran@liranbarshrim.com</div>
  </div>
  <div class="arrow">→</div>
</a>

<!-- SOURCE -->
<a href="https://github.com/liranbarshrim-ui/human-stop-boundary" target="_blank">
  <div>
    <div class="label">Source</div>
    <div class="title">See how this is built</div>
  </div>
  <div class="arrow">→</div>
</a>

</div>

<p class="copyright">

</p>

</div>
</body>
</html>
